        <form class="signup-form" method="post" action="" name="host-signup" id="host-signup">

            <div class="form-row">
                <div class="input-group">
                    <input type="text" name="fname" placeholder="First Name" required>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <input type="text" name="mname" placeholder="Middle Name">
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <input type="text" name="lname" placeholder="Last Name" required>
                    <small class="error"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="Gmail" required>
                    </div>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <input type="date" name="dob" required>
                    <small class="error"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <select name="sex" required>
                        <option value="" disabled selected>Select Sex</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="number" name="m_no" placeholder="Mobile Number" required>
                    </div>
                    <small class="error"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <input type="text" name="lev" placeholder="Game Level" required>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <input type="text" name="id" placeholder="Game UID" required>
                    <small class="error"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="passw" placeholder="Password" required>
                    </div>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="cpass" placeholder="Confirm Password" required>
                    </div>
                    <small class="error"></small>
                </div>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

    </div>


    <script>
        const form = document.getElementById("host-signup");
        const inputs = form.querySelectorAll("input, select");

        // Live validation while typing
        inputs.forEach(input => {
            input.addEventListener("input", () => validateField(input));
            input.addEventListener("change", () => validateField(input));
        });

        function validateField(input) {
            const errorElement = input.closest(".input-group").querySelector(".error");
            let message = "";

            switch (input.name) {

                case "fname":
                case "mname":
                case "lname":
                    const usernamePattern8 = /^[A-Za-z]+$/;

                    if (input.value.trim() === "") {
                        message = "Username is required";
                    }
                    else if (!usernamePattern8.test(input.value)) {
                        message = "Only alphabets (A–Z) are allowed. No spaces or numbers.";
                    }
                    break;


                case "email":
                    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                    if (!emailPattern.test(input.value.trim())) {
                        message = "Enter a valid email address";
                    }
                    break;

                case "dob":
                    if (input.value === "") {
                        message = "Please select your date of birth";
                    } else {
                        const dob = new Date(input.value);
                        const today = new Date();

                        let age = today.getFullYear() - dob.getFullYear();
                        const monthDiff = today.getMonth() - dob.getMonth();

                        // Adjust age if birthday hasn't occurred yet this year
                        if (monthDiff < 0 ||
                            (monthDiff === 0 && today.getDate() < dob.getDate())) {
                            age--;
                        }

                        if (age < 18) {
                            message = "You must be at least 18 years old";
                        }
                    }
                    break;


                case "m_no":
                    if (!/^[0-9]{10}$/.test(input.value.trim())) {
                        message = "Enter 10 digit mobile number";
                    }
                    break;

                case "passw":

                    const password1 = input.value;
                    let errors = [];

                    if (password1.length < 8) {
                        errors.push("Minimum 8 characters required");
                    }

                    if (!/[A-Z]/.test(password1)) {
                        errors.push("At least one uppercase letter required");
                    }

                    if (!/[a-z]/.test(password1)) {
                        errors.push("At least one lowercase letter required");
                    }

                    if (!/[0-9]/.test(password1)) {
                        errors.push("At least one number required");
                    }

                    if (!/[@$!%*?&]/.test(password1)) {
                        errors.push("At least one special character (@$!%*?&) required");
                    }

                    if (errors.length > 0) {
                        message = errors.join(", ");
                    }

                    break;


                case "cpass":
                    const password = form.querySelector("input[name='passw']").value;
                    if (input.value !== password) {
                        message = "Passwords do not match";
                    }
                    break;

                case "lev":

                    const level = parseInt(input.value);

                    if (input.value.trim() === "") {
                        message = "Game level is required";
                    }
                    else if (isNaN(level)) {
                        message = "Level must be a number";
                    }
                    else if (level < 65 || level > 100) {
                        message = "Level must be greater than 65 and less than 100";
                    }

                    break;


                case "id":

                    const gameId = input.value.trim();

                    if (gameId === "") {
                        message = "Game UID is required";
                    }
                    else if (!/^[0-9]+$/.test(gameId)) {
                        message = "Game UID must contain only numbers";
                    }
                    else if (gameId.length < 8) {
                        message = "Game UID must be at least 8 digits";
                    }

                    break;

            }

            if (message !== "") {
                showError(input, errorElement, message);
                return false;
            } else {
                removeError(input, errorElement);
                return true;
            }
        }

        function showError(input, errorElement, message) {
            input.classList.add("error-border");
            errorElement.textContent = message;
        }

        function removeError(input, errorElement) {
            input.classList.remove("error-border");
            errorElement.textContent = "";
        }

        // Final check before submit
        form.addEventListener("submit", function (e) {
            let isValid = true;

            inputs.forEach(input => {
                if (!validateField(input)) {
                    isValid = false;
                }
            });

            if (!isValid) {
                e.preventDefault();
            }
        });
    </script>

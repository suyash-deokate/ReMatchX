<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Login | ReMatchX</title>
    <link rel="stylesheet" href="style/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    </style>
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="left-section">
                <h2><span>Player Login <span id="thunder">⚡</span></span></h2>
                <p class="tagline">Welcome back, warrior! Ready to rejoin the battlefield?</p>
                <form action="/player-login" method="post">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <label>Password</label>
                    <input type="password" name="passw" placeholder="Enter your password" required>
                    <a href="#" class="forgot">Forgot password?</a>
                    <button type="submit" class="login-btn">Log in</button>
                    <div class="divider">or continue with</div>
                    <div class="social-login">
                        <button class="google">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
                            Continue with Google
                        </button>
                        <button class="facebook">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
                                alt="Facebook logo">
                            Continue with Facebook
                        </button>
                    </div>
                    <p class="signup-text">Don’t have an account? <a href="registration.html">Sign up</a></p>
                </form>
            </div>
            <div class="right-section">
                <img src="style/img/PandHlogin.jpg" alt="Player Image">
            </div>
        </div>
    </div>


    <!-- Alert Modal -->
    <div id="premiumAlert" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Access Denied</h2>
            <p>This module is currently offline.</p>
            <button id="okBtn">OK</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById("premiumAlert");
        const closeBtn = document.querySelector(".close-btn");
        const okBtn = document.getElementById("okBtn");

        const loginBtn = document.querySelector(".login-btn");
        const googleBtn = document.querySelector(".google");
        const facebookBtn = document.querySelector(".facebook");

        function showPremiumAlert(e) {
            e.preventDefault();
            modal.style.display = "flex";
        }

        // Show modal on button clicks
        loginBtn.addEventListener("click", showPremiumAlert);
        googleBtn.addEventListener("click", showPremiumAlert);
        facebookBtn.addEventListener("click", showPremiumAlert);

        // Close modal
        closeBtn.onclick = () => modal.style.display = "none";
        okBtn.onclick = () => modal.style.display = "none";

        window.onclick = (e) => {
            if (e.target == modal) {
                modal.style.display = "none";
            }
        };
    </script>


</body>


</html>
